framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: true
    handle_all_throwables: true

    # Enables session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    # PHP files as assets
    asset_mapper:
        paths:
            - assets/

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
