doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        server_version: '16'
        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        types:
            date_mutable: Doctrine\DBAL\Types\DateType
            time_mutable: Doctrine\DBAL\Types\TimeType
            datetime_mutable: Doctrine\DBAL\Types\DateTimeType
            date_immutable: Doctrine\DBAL\Types\DateImmutableType
            time_immutable: Doctrine\DBAL\Types\TimeImmutableType
            datetime_immutable: Doctrine\DBAL\Types\DateTimeImmutableType      
        mapping_types:
            type_client_enum: string
            statut_dossier_enum: string
            matiere_enum: string
            statut_facture_enum: string
            type_document_enum: string
            mode_reglement_enum: string
            statut_echeance_enum: string
            type_echeance_enum: string
            type_evenement_enum: string
            type_partie_adverse_enum: string
            type_convention_honoraire_enum: string
            statut_rdv_enum: string
            type_rdv_enum: string
            type_ecriture_enum: string
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
